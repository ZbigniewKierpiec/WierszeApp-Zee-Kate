<div class="dialog">
  <div class="icon">{{ data.icon || '🔒' }}</div>

  <h2>{{ data.title | translate }}</h2>

  <p>
    {{ data.message | translate }}
  </p>

  <div class="actions">
    <button class="btn subtle" (click)="close()">
      {{ data.cancelText || 'DIALOG.CANCEL' | translate }}
    </button>

    <button class="btn primary" (click)="confirm()">
      {{ data.confirmText || 'DIALOG.LOGIN' | translate }}
    </button>
  </div>
</div>
