<header class="topbar">
  <div class="left">
    ✍️ <span class="logo">Poetry Studio</span>
    <button class="btn subtle" (click)="coverEdit.emit()">📕 <span>Cover</span></button>
  </div>
  

  <button
    mat-raised-button
    color="primary"
    (click)="goDashboard.emit()"
   [matBadge]="(booksCount$ | async) || 0"
    matBadgeColor="accent"
    matBadgeOverlap="false"
  >
    🏠 Dashboard
  </button>

  <div class="right">
    <button class="btn primary" (click)="save.emit()">💾 <span>Save</span></button>
    <button class="btn danger" (click)="clear.emit()">🧹 <span>Clear</span></button>
    <button (click)="export.emit()" class="btn">📥 <span>Export</span></button>

    <ng-container *ngIf="user; else guest">
      <span class="user">👤 {{ user.email }}</span>
      <button class="btn subtle" (click)="logout()">Logout</button>
    </ng-container>

    <ng-template #guest>
      <button class="btn subtle" (click)="goLogin()">Login</button>
      <button class="btn subtle" (click)="goRegister()">Register</button>
    </ng-template>
    <button (click)="newBook.emit()">➕ New Book</button>
    <button class="btn icon">⚙️</button>
  </div>
</header>
