

<nav class="gooey-menu" [class.open]="isMenuOpen" aria-label="Editor toolbar">
  <div class="gooey-items">
    <button
      type="button"
      class="menu-item"
      (click)="toggleItalic()"
      title="Italic"
      aria-label="Italic"
    >
      <span class="tool-label"><em>I</em></span>
    </button>

    <button
      type="button"
      class="menu-item"
      (click)="setBlock('H1')"
      title="Heading 1"
      aria-label="Heading 1"
    >
      <span class="tool-label">H1</span>
    </button>

    <button
      type="button"
      class="menu-item"
      (click)="setBlock('H2')"
      title="Heading 2"
      aria-label="Heading 2"
    >
      <span class="tool-label">H2</span>
    </button>

    <button
      type="button"
      class="menu-item"
      (click)="setBlock('P')"
      title="Paragraph"
      aria-label="Paragraph"
    >
      <span class="tool-label">P</span>
    </button>

    <button
      type="button"
      class="menu-item"
      (click)="setLineHeight('1.2')"
      title="Line height 1.2"
      aria-label="Line height 1.2"
    >
      <span class="tool-label">1.2</span>
    </button>

    <button
      type="button"
      class="menu-item"
      (click)="setLineHeight('1.6')"
      title="Line height 1.6"
      aria-label="Line height 1.6"
    >
      <span class="tool-label">1.6</span>
    </button>
  </div>

  <button
    type="button"
    class="menu-open-button"
    (click)="toggleMenu()"
    aria-label="Open editor tools"
  >
    <span class="hamburger hamburger-1"></span>
    <span class="hamburger hamburger-2"></span>
    <span class="hamburger hamburger-3"></span>
  </button>
</nav>
