<app-topbar (save)="save()" (clear)="clear()"></app-topbar>

<div class="layout">
  <!-- SIDEBAR -->
  <app-sidebar
    [selectedTemplate]="selectedTemplate"
    [selectedTheme]="selectedTheme"
    [selectedVariant]="selectedVariant"
    (themeChange)="applyTheme($event)"
    (templateChange)="applyTemplate($event)"
    (variantChange)="applyVariant($event)"
    (save)="save()"
    (clear)="clear()"
  ></app-sidebar>

  <!-- EDITOR -->
  <div class="editor-area">
    <!-- 🔧 TOOLBAR -->
    <div class="toolbar">
      <select [(ngModel)]="textFont">
        <option>Playfair Display</option>
        <option>Georgia</option>
        <option>Arial</option>
      </select>

      <input type="number" [(ngModel)]="textFontSize" min="12" max="60" />

      <input type="color" [(ngModel)]="textColor" />

      <select [(ngModel)]="textAlign">
        <option value="left">Left</option>
        <option value="center">Center</option>
        <option value="right">Right</option>
      </select>
    </div>

    <!-- ✨ TEMPLATE LABEL -->
    <div class="template-label">
      <span class="icon">
        {{ templateIcons[selectedTemplate] || '📄' }}
      </span>

      <span>
        Template: {{ selectedTemplate }}
        <ng-container *ngIf="selectedVariant"> • {{ selectedVariant.name }} </ng-container>
      </span>
    </div>

    <!-- 📖 POEM -->
    <div class="poem-container" [ngStyle]="getVariantStyles()">
      <input
        [(ngModel)]="title"
        placeholder="Tytuł wiersza..."
        class="title"
        [ngStyle]="{
          'text-align': textAlign,
          'font-family': textFont,
        }"
      />

      <textarea
        [(ngModel)]="text"
        placeholder="Napisz swój wiersz..."
        [ngStyle]="{
          'text-align': textAlign,
          'font-family': textFont,
          'font-size.px': textFontSize,
        }"
      ></textarea>
    </div>

    <!-- 🎛 NAVIGATION -->
    <div class="bottom-bar">
      <button (click)="goBack()">← Back</button>
      <button (click)="preview()">👁 Preview</button>
    </div>

    <!-- 📄 PAGE CONTROLS -->
    <div class="page-controls">
      <button (click)="prevPage()">⬅</button>

      <span> Page {{ currentPageIndex + 1 }} / {{ pages.length }} </span>

      <button (click)="nextPage()">➡</button>

      <button (click)="newPage()">➕ New Page</button>
      <button (click)="deletePage()" [disabled]="pages.length === 1">🗑 Delete</button>
    </div>

    <!-- 🧠 DEBUG (opcjonalne) -->
    <div class="page-id">ID: {{ pages[currentPageIndex]?.id }}</div>
  </div>
</div>

<!-- 🔔 TOASTS -->
@if (savedMessage) {
  <div class="toast success">💾 Zapisano!</div>
}

@if (clearMessage) {
  <div class="toast danger">🧹 Wyczyszczone</div>
}
