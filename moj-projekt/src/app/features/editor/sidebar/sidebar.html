<aside class="sidebar" #sidebar>

  <!-- INDICATOR -->
  <div class="active-indicator"  [class.hidden]="!isCustomizeOpen"        #indicator></div>

  <!-- PRESETS -->
  <div class="section">
    <h3>✨ {{ 'SIDEBAR.PRESETS' | translate }}</h3>

    <div
      class="card"
      *ngFor="let p of presets"
      [class.active]="selectedPreset === p.name"
      (click)="onPresetClick(p)"
    >
      {{ p.icon }} {{ p.name | translate }}
    </div>
  </div>

  <!-- CUSTOMIZE TOGGLE -->
  <div class="section">
    <!-- <button
      type="button"
      class="ghost"
      [class.active]="isCustomizeOpen"
      (click)="openCustomize()"
    >
      <span>⚙ Customize</span>
      <span>{{ isCustomizeOpen ? '▾' : '▸' }}</span>
    </button> -->
    <button
  type="button"
  class="ghost"
  [class.active]="isCustomizeOpen"
  (click)="openCustomize()"
>
  <span>⚙ Customize</span>
  <span>{{ isCustomizeOpen ? '▾' : '▸' }}</span>
</button>
  </div>

  <!-- TEMPLATE (ROZWIJANE - POPRAWNIE OPKOWANE) -->
  <div class="section customize" [class.open]="isCustomizeOpen">

    <div *ngFor="let t of templates" class="template-group">

      <!-- TEMPLATE -->
      <div
        class="card"
        #cardEl
        [class.active]="selectedTemplate === t.name"
        (click)="onTemplateClick(t, cardEl)"
      >
        <span>{{ t.icon }} {{ t.name | translate }}</span>

        <span *ngIf="t.variants?.length" class="arrow">
          {{ openTemplate === t.name ? '▾' : '▸' }}
        </span>
      </div>

      <!-- VARIANTS -->
      <div class="variants" [class.open]="openTemplate === t.name">
        <div
          class="variant"
          #variantEl
          *ngFor="let v of t.variants"
          [class.active]="selectedVariant === v.name || selectedVariant?.name === v.name"
          (click)="onVariantClick(v, variantEl); $event.stopPropagation()"
        >
          • {{ v.name | translate }}
        </div>
      </div>

    </div>

  </div>

  <!-- ACTIONS -->
  <div class="section actions">
    <button type="button" (click)="onSave()">💾 {{ 'SIDEBAR.SAVE' | translate }}</button>
    <button type="button" (click)="onClear()">🧹 {{ 'SIDEBAR.CLEAR' | translate }}</button>
  </div>

</aside>
