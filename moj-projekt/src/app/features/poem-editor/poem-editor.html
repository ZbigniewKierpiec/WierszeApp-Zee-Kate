      </div>
    </div>

    <!-- PREVIEW -->
    <div class="preview">

<div
  class="poem"
  [style.color]="poemColor"
  [style.font-family]="poemFont"
  [style.font-weight]="poemFontWeight"
  [style.font-style]="poemFontStyle"
>

  <!-- TEKST 1 -->
  <span
    cdkDrag
    cdkDragBoundary=".paper"
    class="draggable block"
    contenteditable="true"
  >
    Gdy zamknę oczy, widzę tylko Ciebie. W każdym oddechu, w każdym wspomnieniu.
  </span>

  <!-- SEPARATOR -->
  <span 
    class="separator draggable block" 
    cdkDrag 
    cdkDragBoundary=".paper"
  >
    — ♥ —
  </span>

  <!-- TEKST 2 -->
  <span
    cdkDrag
    cdkDragBoundary=".paper"
    class="draggable block"
    contenteditable="true"
  >
    Jesteś mym światłem w najciemniejszą noc. Jesteś tą ciszą, co koi każdy mrok.
  </span>

  <!-- SEPARATOR -->
  <span 
    class="separator draggable block" 
    cdkDrag 
    cdkDragBoundary=".paper"
  >
    ✧
  </span>

  <!-- TEKST 3 -->
  <span
    cdkDrag
    cdkDragBoundary=".paper"
    class="draggable block"
    contenteditable="true"
  >
    Niech ten wiersz będzie jak szept, który zostanie na zawsze w nas.
  </span>

  <span 
    class="flowers draggable block" 
    cdkDrag 
    cdkDragBoundary=".paper"
  >
    ✿ ✿ ✿
  </span>

</div>












        <!-- dekoracje -->
        <div class="flower top"></div>
        <div class="flower bottom"></div>
      </div>
    </div>

    <!-- BOTTOM MENU -->

    <div class="tabs">
      <button
        class="tab"
        *ngFor="let tab of editorTabs"
        [class.active]="activePanel === tab.id"
        (click)="activePanel = tab.id"
      >
        <span>{{ tab.icon }}</span>
        <small>{{ tab.label }}</small>
      </button>
    </div>
  </div>

  <div class="side-panel">
    <!-- <app-colors-panel></app-colors-panel> -->
    <!-- <app-separator-panel></app-separator-panel> -->

    <!-- <ng-container *ngComponentOutlet="currentPanel,inputs: currentPanelInputs"></ng-container> -->

    <ng-container *ngComponentOutlet="currentPanel; inputs: currentPanelInputs"> </ng-container>
  </div>
</div>
