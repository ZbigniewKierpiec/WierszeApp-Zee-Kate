Gdy zamknę oczy,
widzę tylko Ciebie.
W każdym oddechu,
w każdym wspomnieniu.

Jesteś mym światłem
w najciemniejszą noc.
Jesteś tą ciszą,
co koi każdy mrok.

Niech ten wiersz
będzie jak szept,
który zostanie
na zawsze w nas.
