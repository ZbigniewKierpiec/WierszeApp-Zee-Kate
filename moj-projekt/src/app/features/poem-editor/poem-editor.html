<div class="editor-shell">
  <div class="phone">
    <!-- TOP BAR -->
    <div class="topbar">
      <div class="left">← <span>Edytor wiersza</span></div>

      <div class="right">
        <span class="icon">↶</span>
        <span class="icon">↷</span>
        <button class="save">Zapisz</button>
      </div>
    </div>

    <!-- PREVIEW -->
    <div (click)="clearSeparatorSelection(); activeTextIndex = null" class="preview">
      <div [style.background-image]="backgroundStyle" class="paper">

        <div
          class="poem"
          [style.font-family]="poemFont"
          [style.font-weight]="poemFontWeight"
          [style.font-style]="poemFontStyle"
        >

          <!-- TEXT 1 -->
          <span
            (click)="selectText(0); $event.stopPropagation()"
            [class.active]="activeTextIndex === 0"
            [style.color]="textColors[0] || poemColor"
            class="draggable block"
            contenteditable="true"
          >
            Gdy zamknę oczy, widzę tylko Ciebie...
          </span>

          <!-- SEPARATOR 1 -->
          <span
            class="separator block"
            [class.active]="activeSeparatorIndex === 0"
            (click)="selectSeparator(0); $event.stopPropagation()"
          >
            {{ separators[0] }}
          </span>

          <!-- TEXT 2 -->
          <span
            (click)="selectText(1); $event.stopPropagation()"
            [class.active]="activeTextIndex === 1"
            [style.color]="textColors[1] || poemColor"
            class="draggable block"
            contenteditable="true"
          >
            Jesteś mym światłem...
          </span>

          <!-- SEPARATOR 2 -->
          <span
            class="separator block"
            [class.active]="activeSeparatorIndex === 1"
            (click)="selectSeparator(1); $event.stopPropagation()"
          >
            {{ separators[1] }}
          </span>

          <!-- TEXT 3 -->
          <span
            (click)="selectText(2); $event.stopPropagation()"
            [class.active]="activeTextIndex === 2"
            [style.color]="textColors[2] || poemColor"
            class="draggable block"
            contenteditable="true"
          >
            Niech ten wiersz...
          </span>

          <!-- SEPARATOR 3 -->
          <span
            class="separator block"
            [class.active]="activeSeparatorIndex === 2"
            (click)="selectSeparator(2); $event.stopPropagation()"
          >
            {{ separators[2] }}
          </span>

          <!-- TEXT 4 -->
          <span
            (click)="selectText(3); $event.stopPropagation()"
            [class.active]="activeTextIndex === 3"
            [style.color]="textColors[3] || poemColor"
            class="draggable block"
            contenteditable="true"
          >
            Niech ten wiersz będzie jak szept, który zostanie na zawsze w nas.
          </span>

        </div>
      </div>
    </div>

    <!-- BOTTOM MENU -->
    <div class="tabs">
      <button
        class="tab"
        *ngFor="let tab of editorTabs"
        [class.active]="activePanel === tab.id"
        (click)="activePanel = tab.id"
      >
        <span>{{ tab.icon }}</span>
        <small>{{ tab.label }}</small>
      </button>
    </div>
  </div>

  <div class="side-panel">
    <ng-container
      *ngComponentOutlet="panelMap[activePanel]; inputs: currentPanelInputs">
    </ng-container>
  </div>
</div>
