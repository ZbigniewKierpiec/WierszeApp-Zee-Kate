<div class="editor-shell">
  <div class="phone">
    <!-- TOP BAR -->
    <div class="topbar">
      <div class="left">← <span>Edytor wiersza</span></div>

      <div class="right">
        <span class="icon">↶</span>
        <span class="icon">↷</span>
        <button class="save">Zapisz</button>
      </div>
    </div>

    <!-- PREVIEW -->
    <div class="preview">
      <div [style.background-image]="backgroundStyle" class="paper">
        <!-- POEM -->
        <div
          class="poem"
          [style.color]="poemColor"
          [style.font-family]="poemFont"
          [style.font-weight]="poemFontWeight"
          [style.font-style]="poemFontStyle"
        >
          <!-- ELEMENT 1 -->
          <span class="draggable block" contenteditable="true">
            Gdy zamknę oczy, widzę tylko Ciebie...
          </span>

          <!-- ELEMENT 2 -->
          <span class="separator  block"> — ♥ — </span>

          <!-- ELEMENT 3 -->
          <span class="draggable block" contenteditable="true"> Jesteś mym światłem... </span>

          <!-- ELEMENT 4 -->
          <span class="separator  block"> ✧ </span>

          <!-- ELEMENT 5 -->
          <span class="draggable block" contenteditable="true"> Niech ten wiersz... </span>

          <!-- ELEMENT 6 -->
          <span class="flowers  block"> ✿ ✿ ✿ </span>

          <!-- TEKST 3 -->
          <span
           
            class="draggable block"
            contenteditable="true"
          >
            Niech ten wiersz będzie jak szept, który zostanie na zawsze w nas.
          </span>
        </div>

        <!-- dekoracje -->
        <div class="flower top"></div>
        <div class="flower bottom"></div>
      </div>
    </div>

    <!-- BOTTOM MENU -->
    <div class="tabs">
      <button
        class="tab"
        *ngFor="let tab of editorTabs"
        [class.active]="activePanel === tab.id"
        (click)="activePanel = tab.id"
      >
        <span>{{ tab.icon }}</span>
        <small>{{ tab.label }}</small>
      </button>
    </div>
  </div>

  <div class="side-panel">
    <ng-container *ngComponentOutlet="panelMap[activePanel]; inputs: currentPanelInputs">
    </ng-container>
    <!-- <app-background-panel></app-background-panel> -->
  </div>
</div>
