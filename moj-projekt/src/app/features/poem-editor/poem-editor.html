<div class="editor-shell">
  <div class="phone">
    <!-- TOP BAR -->
    <div class="topbar">
      <div class="left">← <span>Edytor wiersza</span></div>

      <div class="right">
        <span class="icon">↶</span>
        <span class="icon">↷</span>
        <button class="save">Zapisz</button>
      </div>
    </div>

    <!-- PREVIEW -->
    <div class="preview">
      <div class="paper">
        <div class="poem">
          Gdy zamknę oczy, widzę tylko Ciebie. W każdym oddechu, w każdym wspomnieniu.

          <span class="separator">— ♥ —</span>

          Jesteś mym światłem w najciemniejszą noc. Jesteś tą ciszą, co koi każdy mrok.

          <span class="separator">✧</span>

          Niech ten wiersz będzie jak szept, który zostanie na zawsze w nas.

          <span class="flowers">✿ ✿ ✿</span>
        </div>

        <!-- dekoracje -->
        <div class="flower top"></div>
        <div class="flower bottom"></div>
      </div>
    </div>

    <!-- BOTTOM MENU -->

    <div class="tabs">
      <button
        class="tab"
        *ngFor="let tab of editorTabs"
        [class.active]="activePanel === tab.id"
        (click)="activePanel = tab.id"
      >
        <span>{{ tab.icon }}</span>
        <small>{{ tab.label }}</small>
      </button>
    </div>
  </div>

  <div class="side-panel">
 <app-text-panel></app-text-panel>

  </div>
</div>
